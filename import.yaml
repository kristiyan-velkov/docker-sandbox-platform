# yaml-language-server: $schema=https://api.app-prg1.zerops.io/api/rest/public/settings/import-project-yaml-json-schema.json
#
# Paste into Zerops → Import a project.
# No secrets in this file — add them in the Zerops GUI after import (see README).
# buildFromGit is omitted — private repos fail at clone time. Connect GitHub on the
# nextjs service, set Secret Variables, then trigger the first deploy.

project:
  name: docker-sandbox-platform
  description: Docker Sandboxes platform
  tags:
    - workshop
    - nextjs
    - docker-sandboxes

services:
  # ── Next.js workshop app ───────────────────────────────────────────────────
  # Standalone Next.js 16 bundle served by Node.js 22 — registration and Q&A
  # use Supabase via Server Actions. No database required on this service.
  - hostname: nextjs
    type: ubuntu/nodejs@22

    enableSubdomainAccess: true

    minContainers: 1
    maxContainers: 3

    verticalAutoscaling:
      minRam: 0.5
      maxRam: 2
      minCpu: 1
      maxCpu: 2

    envVariables:
      # NODE_ENV=production is set at runtime in zerops.yaml — not here, or npm ci
      # skips devDependencies (Tailwind/PostCSS) and the build fails on Zerops.
      NEXT_TELEMETRY_DISABLED: "1"

    # After import, add in Zerops GUI → nextjs → Secret Variables (exact names):
    #   SUPABASE_ANON_KEY           — same value as Supabase publishable/anon key
    #   SUPABASE_SERVICE_ROLE_KEY   — optional, for /admin dashboard
